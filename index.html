<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>مصروفي | Web App</title>
  <!-- Tailwind (CDN, مناسب لـ GitHub Pages) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="./main.css"/>
</head>
<body class="theme-neon bg-base text-base-fg min-h-screen transition-colors">
  <header class="px-4 py-3 border-b border-border flex items-center justify-between gap-3">
    <div class="flex items-center gap-2">
      <img src="../assets/icons/app.svg" alt="logo" class="w-8 h-8"/>
      <h1 class="text-xl font-bold">مصروفي</h1>
      <span id="app-version" class="text-xs opacity-60"></span>
    </div>
    <nav class="flex items-center gap-2">
      <button id="btn-sync" class="btn-primary" data-i18n="sync">Sync</button>
      <button id="btn-export" class="btn" data-i18n="export">Export</button>
      <button id="btn-reset" class="btn-danger" data-i18n="reset">Reset</button>
      <button id="btn-save" class="btn" data-i18n="save">Save</button>
      <button id="btn-settings" class="btn-ghost" title="Settings">
        ⚙️
      </button>
    </nav>
  </header>

  <!-- Tabs -->
  <main class="p-4 space-y-4">
    <div class="tabs">
      <button class="tab active" data-tab="dashboard" data-i18n="tab.dashboard">Dashboard</button>
      <button class="tab" data-tab="transactions" data-i18n="tab.transactions">Transactions</button>
      <button class="tab" data-tab="budgets" data-i18n="tab.budgets">Budgets</button>
      <button class="tab" data-tab="subscriptions" data-i18n="tab.subscriptions">Subscriptions</button>
      <button class="tab" data-tab="projects" data-i18n="tab.projects">Projects</button>
      <button class="tab" data-tab="reports" data-i18n="tab.reports">Reports</button>
      <button class="tab" data-tab="preferences" data-i18n="tab.preferences">Preferences</button>
    </div>

    <!-- Panels -->
    <section id="panel-dashboard" class="panel active">
      <div class="grid md:grid-cols-4 gap-3">
        <div class="card"><h3 data-i18n="kpi.netIncome">Net Income</h3><div id="kpi-net"></div></div>
        <div class="card"><h3 data-i18n="kpi.savingsRate">Savings Rate</h3><div id="kpi-saving"></div></div>
        <div class="card"><h3 data-i18n="kpi.burnRate">Burn Rate</h3><div id="kpi-burn"></div></div>
        <div class="card"><h3 data-i18n="kpi.fixedShare">Fixed %</h3><div id="kpi-fixed"></div></div>
      </div>
      <div class="card mt-3 overflow-x-auto">
        <h3 class="mb-2" data-i18n="recentActivity">Recent Activity</h3>
        <table class="w-full min-w-[640px] table">
          <thead><tr>
            <th data-i18n="date">Date</th>
            <th data-i18n="category">Category</th>
            <th data-i18n="amount">Amount</th>
            <th data-i18n="note">Note</th>
          </tr></thead>
          <tbody id="tbl-recent"></tbody>
        </table>
      </div>
    </section>

    <section id="panel-transactions" class="panel">
      <form id="form-tx" class="card form step-form" data-form="transactions">
        <div class="steps">
          <div class="step active" data-step="1">
            <div class="grid md:grid-cols-4 gap-3">
              <div>
                <label data-i18n="date"></label>
                <input type="date" class="input" data-bind="transactions.date" required>
              </div>
              <div>
                <label data-i18n="account"></label>
                <select class="input" data-bind="transactions.account_id"></select>
              </div>
              <div>
                <label data-i18n="category"></label>
                <select class="input" data-bind="transactions.category_id" required></select>
              </div>
              <div>
                <label data-i18n="amount"></label>
                <input type="number" step="0.01" class="input" data-bind="transactions.amount" required>
              </div>
            </div>
          </div>
          <div class="step" data-step="2">
            <div class="grid md:grid-cols-3 gap-3">
              <div>
                <label data-i18n="note"></label>
                <input type="text" class="input" data-bind="transactions.note" placeholder="...">
              </div>
              <div>
                <label data-i18n="project"></label>
                <select class="input" data-bind="transactions.project_id"></select>
              </div>
              <div>
                <label data-i18n="tags"></label>
                <input type="text" class="input" data-bind="transactions.tags" placeholder="tag1,tag2">
              </div>
            </div>
          </div>
        </div>
        <div class="form-nav">
          <button type="button" class="btn" data-action="prev" data-i18n="prev">Prev</button>
          <button type="button" class="btn" data-action="next" data-i18n="next">Next</button>
          <div class="grow"></div>
          <button type="submit" class="btn-primary" data-i18n="save">Save</button>
        </div>
      </form>

      <div class="card mt-3 overflow-x-auto">
        <table class="w-full min-w-[720px] table">
          <thead><tr>
            <th>#</th>
            <th data-i18n="date">Date</th>
            <th data-i18n="account">Account</th>
            <th data-i18n="category">Category</th>
            <th data-i18n="amount">Amount</th>
            <th data-i18n="project">Project</th>
            <th data-i18n="note">Note</th>
          </tr></thead>
          <tbody id="tbl-tx"></tbody>
        </table>
      </div>
    </section>

    <section id="panel-budgets" class="panel">
      <div class="card">
        <h3 data-i18n="budgets"></h3>
        <div id="budgets-container" class="grid md:grid-cols-3 gap-3"></div>
        <div class="mt-3 text-right">
          <button id="btn-budget-save" class="btn-primary" data-i18n="save">Save</button>
        </div>
      </div>
    </section>

    <section id="panel-subscriptions" class="panel">
      <div class="card">
        <h3 data-i18n="subscriptions"></h3>
        <div id="subs-container" class="grid md:grid-cols-2 gap-3"></div>
      </div>
    </section>

    <section id="panel-projects" class="panel">
      <div class="card">
        <h3 data-i18n="projects"></h3>
        <div id="projects-container" class="grid md:grid-cols-2 gap-3"></div>
      </div>
    </section>

    <section id="panel-reports" class="panel">
      <div class="card">
        <h3 data-i18n="reports"></h3>
        <div class="grid md:grid-cols-2 gap-3">
          <div>
            <label data-i18n="reportRange"></label>
            <input type="month" class="input" id="report-month" />
          </div>
          <div class="flex items-end">
            <button id="btn-run-report" class="btn-primary" data-i18n="run">Run</button>
          </div>
        </div>
        <div id="report-out" class="mt-3 overflow-x-auto"></div>
      </div>
    </section>

    <section id="panel-preferences" class="panel">
      <div class="card grid md:grid-cols-3 gap-3">
        <div>
          <label data-i18n="theme"></label>
          <select id="pref-theme" class="input">
            <option value="neon">neon</option>
            <option value="ocean">ocean</option>
            <option value="rose">rose</option>
            <option value="mint">mint</option>
          </select>
        </div>
        <div>
          <label data-i18n="transitionSpeed"></label>
          <input id="pref-trans-speed" type="range" min="150" max="1200" step="50" class="input">
        </div>
        <div>
          <label data-i18n="language"></label>
          <select id="pref-lang" class="input">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
          </select>
        </div>
      </div>
    </section>
  </main>

  <!-- Settings Modal -->
  <dialog id="dlg-settings" class="modal">
    <form method="dialog" class="modal-box">
      <h3 class="font-bold mb-2" data-i18n="settings">Settings</h3>
      <div class="grid gap-3">
        <label class="block">
          <span>Google Apps Script URL</span>
          <input id="cfg-gas-url" class="input" placeholder="https://script.google.com/macros/s/xxx/exec">
        </label>
        <label class="block">
          <span data-i18n="execAs">Execute as</span>
          <select id="cfg-exec" class="input">
            <option value="me">Me</option>
            <option value="anon">Anyone</option>
          </select>
        </label>
      </div>
      <div class="mt-3 text-right">
        <button class="btn" value="cancel" data-i18n="cancel">Cancel</button>
        <button id="btn-settings-save" class="btn-primary" value="default" data-i18n="save">Save</button>
      </div>
    </form>
  </dialog>

  <!-- Toasts -->
  <div id="toasts" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50"></div>

  <script src="./app-config.js"></script>
  <script src="./app-i18n.js"></script>
  <script src="./app-state.js"></script>
  <script src="./app-utils.js"></script>
  <script src="./app-dom.js"></script>
  <script src="./app-forms.js"></script>
  <script src="./app-data.js"></script>
  <script src="./app-sync.js"></script>
</body>
</html>
